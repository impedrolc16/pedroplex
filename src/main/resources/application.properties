spring.application.name=pedroplex

# Increase buffer size for large API responses
spring.codec.max-in-memory-size=1048576

# API URLs (defaults)
trakt.api.url=https://api.trakt.tv
tmdb.api.url=https://api.themoviedb.org/3

# Reactor Netty Configuration
reactor.netty.http.client.secure.default-configuration-type=auto

# Server performance improvements
spring.webflux.base-path=/
server.netty.connection-timeout=10000ms
server.http2.enabled=true

